<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Future | Account Verified</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* خلفية سوداء فخمة متناسقة مع الموقع الأساسي وسديم بنفسجي خفيف */
        body {
            background: radial-gradient(circle at center, #0e091f 0%, #040308 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* كرت التأكيد في منتصف الشاشة تماماً ومتوافق مع الموبايل والكمبيوتر */
        .verify-card {
            background: rgba(10, 8, 15, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* علامة الصح المتحركة والمضيئة باللون الأخضر */
        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(52, 211, 153, 0.05);
            border: 2px solid #34d399;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.2);
            animation: pulseGreen 2s infinite alternate;
        }

        @keyframes pulseGreen {
            0% { box-shadow: 0 0 10px rgba(52, 211, 153, 0.2); transform: scale(1); }
            100% { box-shadow: 0 0 25px rgba(52, 211, 153, 0.5); transform: scale(1.05); }
        }

        .icon-box i {
            font-size: 2.2rem;
            color: #34d399;
        }

        /* النصوص البيضاء الواضحة في السنتر */
        .verify-card h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .verify-card p {
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* زر العودة للموقع الأساسي */
        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #00bcd4;
            color: #000000;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
            width: 100%;
        }

        .back-btn:hover {
            background: #00e5ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 188, 212, 0.4);
        }

        /* دعم كامل وممتاز لترجمة جوجل التلقائية دون أي تعليق */
        font {
            background: transparent !important;
            color: inherit !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <div class="verify-card">
        
        <div class="icon-box">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <h1>Email Verified Successfully</h1>
        <p>Your identity has been confirmed. Your email belongs to you and your account is now fully activated in The Future network.</p>

        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Login
        </a>

    </div>

    <script>
        // أول ما المستخدم يفتح الصفحة دي، بنسجل في ذاكرة المتصفح إن حسابه اتفعل بجد
        localStorage.setItem('accountVerified', 'true');
        
        // اختياري: لو عايز تحفظ الإيميل اللي اتفعل برضه
        localStorage.setItem('verifiedEmail', 'true');
    </script>
</body>
</html>
